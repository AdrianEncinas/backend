<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
  </div>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M7 17l4-8 4 8" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8.5 14h7" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
          <circle cx="19" cy="7" r="3" fill="#10B981"/>
        </svg>
      </div>
      <span class="brand-name">AssetTrack</span>
    </div>

    <div class="tabs">
      <button class="tab-btn" [class.active]="tab === 'login'" (click)="switchTab('login')">Iniciar sesion</button>
      <button class="tab-btn" [class.active]="tab === 'register'" (click)="switchTab('register')">Registrarse</button>
    </div>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>

    <form *ngIf="tab === 'login'" (ngSubmit)="onLogin()" class="auth-form">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" placeholder="tu_usuario" [(ngModel)]="loginUsername" name="loginUsername" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" placeholder="********" [(ngModel)]="loginPassword" name="loginPassword" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        <span>{{ loading ? 'Iniciando...' : 'Entrar' }}</span>
      </button>
    </form>

    <form *ngIf="tab === 'register'" (ngSubmit)="onRegister()" class="auth-form">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" placeholder="tu_usuario" [(ngModel)]="regUsername" name="regUsername" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" placeholder="********" [(ngModel)]="regPassword" name="regPassword" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Confirmar contrasena</label>
        <input type="password" placeholder="********" [(ngModel)]="regPasswordConfirm" name="regPasswordConfirm" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Divisa base</label>
        <select [(ngModel)]="regCurrency" name="regCurrency">
          <option *ngFor="let c of currencies" [value]="c">{{ c }}</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        <span>{{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}</span>
      </button>
    </form>

    <p class="auth-footer">Plataforma de inversiones premium | AssetTrack</p>
  </div>
</div>
